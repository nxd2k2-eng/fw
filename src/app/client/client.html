<div class="slider-wrapper">
  <div class="slider-stage">
    <div class="slide active">
      <img [src]="currentSlide.src" [alt]="currentSlide.alt" />
      <div class="slide-title"><h2>{{ currentSlide.title }}</h2></div>
    </div>

    <div class="slide-counter">
      <span>{{ currentIndex() + 1 }}</span> / <span>{{ slideCount }}</span>
    </div>

    <div class="dots">

      @for (image of slides; track image.src; let i = $index) {
        <button
          type="button"
          class="dot"
          [class.active]="i === currentIndex()"
          (click)="goTo(i)"
          [attr.aria-label]="'Ảnh ' + (i + 1)"
        ></button>
      }
    </div>
  </div>

  <button class="arrow arrow-prev" type="button" aria-label="Ảnh trước" (click)="goPrev()">
    <svg viewBox="0 0 24 24"><polyline points="15 18 9 12 15 6"/>></svg>
  </button>
  <button class="arrow arrow-next" type="button" aria-label="Ảnh tiếp theo" (click)="goNext()">
    <svg viewBox="0 0 24 24"><polyline points="9 18 15 12 9 6"/>></svg>
  </button>
</div>
